name: Build C#

# Reusable workflow — call from consuming repos:
#
#   jobs:
#     build:
#       uses: goeke-m/ai-dev-lifecycle/.github/workflows/build-csharp.yml@main
#       with:
#         dotnet-version: '9.0.x'
#         project-path: 'src/MyProject/MyProject.csproj'

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: 'The .NET SDK version to use (e.g., 9.0.x)'
        type: string
        default: '9.0.x'
        required: false

      project-path:
        description: 'Path to the .sln or .csproj file to build. Defaults to the first .sln found.'
        type: string
        default: ''
        required: false

      configuration:
        description: 'Build configuration (Debug or Release)'
        type: string
        default: 'Release'
        required: false

      upload-artifacts:
        description: 'Whether to upload build artifacts'
        type: boolean
        default: true
        required: false

      artifact-name:
        description: 'Name for the uploaded artifact'
        type: string
        default: 'build-output'
        required: false

      artifact-path:
        description: 'Path to the directory to upload as an artifact'
        type: string
        default: 'bin'
        required: false

    outputs:
      artifact-name:
        description: 'The name of the uploaded build artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build (${{ inputs.configuration }})
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs.artifact-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for GitVersion / NBGV if used

      - name: Set up .NET ${{ inputs.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'

      - name: Build
        run: |
          dotnet build ${{ inputs.project-path }} \
            --no-restore \
            --configuration ${{ inputs.configuration }} \
            -p:TreatWarningsAsErrors=true \
            -p:ContinuousIntegrationBuild=true
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'

      - name: Verify no formatting issues
        run: dotnet format --verify-no-changes ${{ inputs.project-path }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'

      - name: Upload build artifacts
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}
          retention-days: 7
          if-no-files-found: error
